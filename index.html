<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>grok-build 代码解读 Wiki</title>
	<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
	<style>
		.mermaid { text-align: center; margin: 1em 0; }
	</style>
</head>
<body>
	<div id="app">加载中…</div>
	<script>
		window.$docsify = {
			name: "grok-build 代码解读",
			repo: "https://github.com/xai-org/grok-build",
			homepage: "index.md",
			loadSidebar: true,
			subMaxLevel: 2,
			auto2top: true,
			// 官方全文搜索插件：纯浏览器端建索引，无需后端。
			// namespace 是 localStorage 索引缓存的命名空间——内容大改版后必须换新，
			// 否则旧索引里的链接会指向已改名/删除的文件（404）。
			search: {
				paths: "auto",
				placeholder: "搜索 Wiki 内容…",
				noData: "没有找到相关内容",
				depth: 4,
				namespace: "grok-build-wiki-v3",
				maxAge: 3600000,
			},
			plugins: [
				function (hook) {
					// 渲染 mermaid 的稳妥做法：
					// 1) beforeEach 把 ```mermaid 代码块换成占位元素，源码存进数组——
					//    marked 再也接触不到图的内容，无论图在列表里还是顶层都不会被改坏；
					// 2) doneEach 用 textContent 把源码写进 <div class="mermaid">——
					//    不经过 HTML 解析，< > & 等字符原汁原味交给 mermaid。
					var diagrams = [];
					hook.beforeEach(function (content) {
						diagrams = [];
						return content.replace(/```mermaid[^\S\n]*\n([\s\S]*?)```/g, function (_, code) {
							diagrams.push(code);
							return '\n\n<p class="mermaid-placeholder" data-i="' + (diagrams.length - 1) + '"></p>\n\n';
						});
					});
					hook.doneEach(function () {
						document.querySelectorAll(".mermaid-placeholder").forEach(function (el) {
							var div = document.createElement("div");
							div.className = "mermaid";
							div.textContent = diagrams[Number(el.getAttribute("data-i"))] || "";
							el.replaceWith(div);
						});
						mermaid.run({ querySelector: ".mermaid" });
					});
				},
			],
		};
	</script>
	<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
	<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
	<script>
		mermaid.initialize({ startOnLoad: false, theme: "default" });
	</script>
</body>
</html>

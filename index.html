<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>grok-build 代码解读 Wiki</title>
	<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
	<style>
		.mermaid { text-align: center; margin: 1em 0; }
	</style>
</head>
<body>
	<div id="app">加载中…</div>
	<script>
		window.$docsify = {
			name: "grok-build 代码解读",
			repo: "https://github.com/xai-org/grok-build",
			homepage: "index.md",
			loadSidebar: true,
			subMaxLevel: 2,
			auto2top: true,
			plugins: [
				function (hook) {
					// 在 marked 处理 markdown 之前，把 ```mermaid 代码块整体换成
					// HTML 转义过的 <div class="mermaid">…</div>。
					// 不这么做的话，图里的 < > & 等字符（如 Vec<u8>）会被
					// marked/浏览器当成 HTML 标签吞掉，mermaid 拿到的就是残缺的文本。
					hook.beforeEach(function (content) {
						return content.replace(/```mermaid[^\S\n]*\n([\s\S]*?)```/g, function (_, code) {
							var escaped = code
								.replace(/&/g, "&amp;")
								.replace(/</g, "&lt;")
								.replace(/>/g, "&gt;");
							return '<div class="mermaid">' + escaped + "</div>";
						});
					});
					hook.doneEach(function () {
						mermaid.run({ querySelector: ".mermaid" });
					});
				},
			],
		};
	</script>
	<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
	<script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
	<script>
		mermaid.initialize({ startOnLoad: false, theme: "default" });
	</script>
</body>
</html>
